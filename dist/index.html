<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Library</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="header__title">Library</h1>
        <button id="btn-new" class="btn btn--add btn--small" type="button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="btn__icon"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
              clip-rule="evenodd"
            />
          </svg>
          New Book
        </button>
      </header>
      <hr />
      <section class="new-book hidden">
        <form class="new-book__form">
          <label for="book-name">Name:</label>
          <input type="text" id="book-name" required />

          <label for="book-author">Author:</label>
          <input type="text" id="book-author" required />

          <label for="book-pages">Pages:</label>
          <input type="number" id="book-pages" min="10" required />

          <div class="checkbox-container">
            <label for="book-read">Have you read the book?</label>
            <input type="checkbox" id="book-read" />
          </div>

          <div class="btn-container">
            <button class="btn btn--add" type="submit">Add</button>
            <button id="btn-cancel" class="btn btn--cancel" type="button">
              Cancel
            </button>
          </div>
        </form>
        <hr />
      </section>
      <section class="books hidden">
        <table class="books__table">
          <thead class="books__table__header">
            <tr class="books__table__row">
              <th class="books__table__cell">Name</th>
              <th class="books__table__cell">Author</th>
              <th class="books__table__cell">Pages</th>
              <th class="books__table__cell">Read</th>
            </tr>
          </thead>
          <tbody class="books__table__body"></tbody>
        </table>
        <p class="books__note">
          If you want to delete or change read status of the book right click or
          hold the table row
        </p>
      </section>
    </div>
    <div class="context-menu hidden">
      <button id="btn-delete" class="menu-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="menu-btn__icon"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
            clip-rule="evenodd"
          />
        </svg>
        Delete
      </button>
      <button id="btn-change" class="menu-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="menu-btn__icon"
          viewBox="0 0 20 20"
          fill="currentColor"
        >
          <path
            d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"
          />
          <path
            fill-rule="evenodd"
            d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"
            clip-rule="evenodd"
          />
        </svg>
        Change read status
      </button>
    </div>
    <script src="../src/js/app.js"></script>
  </body>
</html>
