<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Library</title>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="header__title">Library</h1>
        <button class="btn btn--add btn--small" type="button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="btn__icon"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path
              fill-rule="evenodd"
              d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
              clip-rule="evenodd"
            />
          </svg>
          New Book
        </button>
      </header>
      <hr />
      <section class="new-book">
        <!-- hidden -->
        <form class="new-book__form">
          <label for="book-name">Name:</label>
          <input type="text" id="book-name" required />

          <label for="book-author">Author:</label>
          <input type="text" id="book-author" required />

          <label for="book-pages">Pages:</label>
          <input type="number" id="book-pages" min="10" required />

          <div class="checkbox-container">
            <label for="book-read">Have you read the book?</label>
            <input type="checkbox" id="book-read" required />
          </div>

          <div class="btn-container">
            <button class="btn btn--add" type="submit">Add</button>
            <button class="btn btn--cancel" type="button">Cancel</button>
          </div>
        </form>
        <hr />
      </section>
      <section class="books">
        <!-- hidden -->
        <table class="books__table">
          <thead class="books__table__header">
            <tr class="books__table__row">
              <th class="books__table__cell">Name</th>
              <th class="books__table__cell">Author</th>
              <th class="books__table__cell">Pages</th>
              <th class="books__table__cell">Read</th>
            </tr>
          </thead>
          <tbody class="books__table__body"></tbody>
        </table>
      </section>
    </div>
    <script src="../src/js/app.js"></script>
  </body>
</html>
